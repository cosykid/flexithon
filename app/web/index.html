<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="accessmap">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>accessmap</title>
  <link rel="manifest" href="manifest.json">

  <!-- Hide the Google Maps web UI chrome (keyboard shortcuts, "Map data",
       Terms, Report a map error) along the bottom edge of the map. -->
  <style>
    .gm-style-cc,
    .gm-fullscreen-control,
    .gm-bundled-control,
    gmp-internal-camera-control,
    .gm-style button[title="Keyboard shortcuts"],
    .gm-style [aria-label="Keyboard shortcuts"] {
      display: none !important;
    }
  </style>

  <!-- Google Maps JavaScript API (required by google_maps_flutter on web).
       The key is NOT committed: copy web/maps_config.example.js →
       web/maps_config.js (gitignored) and paste a key with "Maps JavaScript
       API" enabled and this origin allow-listed. -->
  <script src="maps_config.js"></script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
